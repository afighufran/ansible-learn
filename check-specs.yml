---
- name: Belajar cara menggunakan Variables and Facts
  hosts: testing_server
  become: yes

  vars:
    owner_name: "Afi"
    log_dir: "/var/log/audit_log"
  
  tasks:
    - name: Membuat folder audit log menggunakan variable
      file:
        path: "{{log_dir}}"
        state: directory
        mode: '0755'
    
    - name: Menampilkan informasi spesifikasi server menggunakan facts
      debug:
        msg:
          - "Hostname: {{ansible_facts['hostname']}}"
          - "Operating System: {{ansible_facts['distribution']}} {{ansible_facts['distribution_version']}}"
          - "Kernel Version: {{ansible_facts['kernel']}}"
          - "Total Memory: {{ansible_facts['memtotal_mb']}} MB"
          - "Folder log disimpan: {{log_dir}}"